<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3584e4"/>
      <stop offset="100%" stop-color="#1c71d8"/>
    </linearGradient>
    <linearGradient id="globe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#deddda" stop-opacity="0.95"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect x="4" y="4" width="120" height="120" rx="24" ry="24" fill="url(#bg)"/>
  <!-- Globe circle -->
  <circle cx="56" cy="62" r="32" fill="none" stroke="url(#globe)" stroke-width="3"/>
  <!-- Globe meridians -->
  <ellipse cx="56" cy="62" rx="14" ry="32" fill="none" stroke="url(#globe)" stroke-width="2.2"/>
  <ellipse cx="56" cy="62" rx="26" ry="32" fill="none" stroke="url(#globe)" stroke-width="1.5" opacity="0.5"/>
  <!-- Globe parallels -->
  <line x1="24" y1="50" x2="88" y2="50" stroke="url(#globe)" stroke-width="1.8" opacity="0.7"/>
  <line x1="24" y1="62" x2="88" y2="62" stroke="url(#globe)" stroke-width="1.8" opacity="0.7"/>
  <line x1="24" y1="74" x2="88" y2="74" stroke="url(#globe)" stroke-width="1.8" opacity="0.7"/>
  <!-- Translation speech bubble -->
  <rect x="62" y="28" width="46" height="32" rx="8" ry="8" fill="#ffffff" opacity="0.95"/>
  <polygon points="68,60 74,60 70,68" fill="#ffffff" opacity="0.95"/>
  <!-- Text lines in bubble (representing translations) -->
  <rect x="69" y="35" width="24" height="3" rx="1.5" fill="#1c71d8"/>
  <rect x="69" y="41" width="32" height="3" rx="1.5" fill="#1c71d8"/>
  <rect x="69" y="47" width="18" height="3" rx="1.5" fill="#1c71d8"/>
  <rect x="69" y="53" width="28" height="3" rx="1.5" fill="#1c71d8" opacity="0.5"/>
  <!-- Debian swirl (simplified) -->
  <path d="M56,48 C60,46 63,48 62,52 C61,56 57,58 54,56 C51,54 52,50 56,48 Z" 
        fill="none" stroke="#ffffff" stroke-width="2.5" opacity="0.8"/>
  <path d="M62,52 C64,50 66,52 65,55" 
        fill="none" stroke="#ffffff" stroke-width="2.5" opacity="0.8" stroke-linecap="round"/>
</svg>
